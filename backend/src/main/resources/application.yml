server:
  port: ${PORT:8080}

spring:
  application:
    name: scada
  devtools:
    restart:
      enabled: false
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:backend/.env[.properties]
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      ssl:
        enabled: ${REDIS_SSL_ENABLED:false}
      url: ${REDIS_URL:redis://${REDIS_HOST:localhost}:${REDIS_PORT:6379}}

app:
  cors:
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:5173,http://localhost:4173,http://192.168.0.100:11005}

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration-ms: ${JWT_ACCESS_TOKEN_EXPIRATION_MS}
  refresh-token-expiration-ms: ${JWT_REFRESH_TOKEN_EXPIRATION_MS}

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

mqtt:
  enabled: ${MQTT_ENABLED:false}
  broker-url: ${MQTT_BROKER_URL:tcp://localhost:1883}
  client-id: ${MQTT_CLIENT_ID:scada-backend}
  username: ${MQTT_USERNAME:}
  password: ${MQTT_PASSWORD:}
  topic: ${MQTT_TOPIC:scada/team5/plant/+/facility/+/energy}

energy:
  summary:
    hourly-cron: ${ENERGY_SUMMARY_HOURLY_CRON:0 5 * * * *}
    daily-cron: ${ENERGY_SUMMARY_DAILY_CRON:0 10 0 * * *}
    monthly-cron: ${ENERGY_SUMMARY_MONTHLY_CRON:0 30 0 1 * *}

openai:
  api-key: ${OPENAI_API_KEY:}
  model: ${OPENAI_MODEL:gpt-5.4-mini}
  base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
  timeout-seconds: ${OPENAI_TIMEOUT_SECONDS:10}
  max-output-tokens: ${OPENAI_MAX_OUTPUT_TOKENS:600}
  web-search-enabled: ${OPENAI_WEB_SEARCH_ENABLED:true}
  image-generation-enabled: ${OPENAI_IMAGE_GENERATION_ENABLED:true}
  file-search-enabled: ${OPENAI_FILE_SEARCH_ENABLED:true}
  vector-store-id: ${OPENAI_VECTOR_STORE_ID:}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
