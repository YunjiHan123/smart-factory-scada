server:
  port: ${PORT:8080}

spring:
  application:
    name: scada
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:backend/.env[.properties]
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  data:
    redis:
      url: ${REDIS_URL:redis://${REDIS_HOST:localhost}:${REDIS_PORT:6379}}

app:
  cors:
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:5173,http://localhost:4173}

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration-ms: ${JWT_ACCESS_TOKEN_EXPIRATION_MS}
  refresh-token-expiration-ms: ${JWT_REFRESH_TOKEN_EXPIRATION_MS}

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

mqtt:
  broker-url: ${MQTT_BROKER_URL:tcp://localhost:1883}
  client-id: ${MQTT_CLIENT_ID:scada-backend}
  username: ${MQTT_USERNAME:}
  password: ${MQTT_PASSWORD:}
  topic: ${MQTT_TOPIC:scada/team5/plant/+/facility/+/energy}

energy:
  summary:
    daily-cron: ${ENERGY_SUMMARY_DAILY_CRON:0 10 0 * * *}
    monthly-cron: ${ENERGY_SUMMARY_MONTHLY_CRON:0 30 0 1 * *}
